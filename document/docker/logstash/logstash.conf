# mall 项目 Logstash 配置模板
# 收集 mall-* 容器发送的 JSON 日志（通过 TCP/UDP 端口 4560-4563）
# 输出到 Elasticsearch 的 mall-logs 索引
#
# 用法：将此文件挂载到 /usr/share/logstash/pipeline/logstash.conf
# 容器输出 logger 默认对接到这些端口（见各服务 application-prod.yml 的 logback-spring.xml）

input {
    tcp {
        port => 4560
        codec => json_lines
    }
    tcp {
        port => 4561
        codec => json_lines
    }
    tcp {
        port => 4562
        codec => json_lines
    }
    tcp {
        port => 4563
        codec => json_lines
    }
}

filter {
    # 补全 @timestamp（logback-logback-encoder 已自带，但兜底一次）
    if ![@timestamp] {
        mutate { add_field => { "[@timestamp]" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}" } }
    }
    # 统一去除无用字段
    mutate {
        remove_field => ["host", "port", "@version"]
    }
}

output {
    elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "mall-logs-%{+YYYY.MM.dd}"
        # 用户名密码（如启用了 xpack.security）
        user => "${ES_USER:}"
        password => "${ES_PASSWORD:}"
    }
    # 本地调试时可打开 stdout
    # stdout { codec => rubydebug }
}
