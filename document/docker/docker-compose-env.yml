# 基础设施服务（MySQL / Redis / RabbitMQ / ES / MongoDB / MinIO / Nginx / Logstash / Kibana）
# 用法：docker compose -f docker-compose-env.yml -p mall up -d
# 然后：docker compose -f docker-compose-app.yml -p mall up -d
# 两个 stack 通过项目名 `-p mall` + 共享的 `mall-net` 网络互通。
networks:
  mall-net:
    name: mall-net
    driver: bridge

services:
  mysql:
    image: mysql:5.7
    container_name: mall-mysql
    hostname: mysql
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    ports:
      - 3306:3306
    volumes:
      - /mydata/mysql/data:/var/lib/mysql
      - /mydata/mysql/conf:/etc/mysql
      - /mydata/mysql/log:/var/log/mysql
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: mall-redis
    hostname: redis
    command: redis-server --appendonly yes
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /mydata/redis/data:/data
    ports:
      - 6379:6379
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.22
    container_name: mall-nginx
    hostname: nginx
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /mydata/nginx/conf:/etc/nginx
      - /mydata/nginx/html:/usr/share/nginx/html
      - /mydata/nginx/logs:/var/log/nginx
    ports:
      - 80:80
    networks:
      - mall-net

  rabbitmq:
    image: rabbitmq:3.9.11-management
    container_name: mall-rabbitmq
    hostname: rabbitmq
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /mydata/rabbitmq/data:/var/lib/rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: mall-elasticsearch
    hostname: elasticsearch
    environment:
      - cluster.name=elasticsearch
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx1024m
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      # 8.x 必须显式关 http SSL，否则 Java RestClient 用 http:// 连不上
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - TZ=Asia/Shanghai
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - /mydata/elasticsearch/plugins:/usr/share/elasticsearch/plugins
      - /mydata/elasticsearch/data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
      - 9300:9300
    networks:
      - mall-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  logstash:
    image: logstash:8.11.0
    container_name: mall-logstash
    hostname: logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - TZ=Asia/Shanghai
      # 关闭严格 license 检查
      - xpack.license.self_generated.type=basic
      - LS_JAVA_OPTS=-Xms256m -Xmx512m
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - /mydata/logstash/logs:/usr/share/logstash/logs
    networks:
      - mall-net
    ports:
      - 4560:4560
      - 4561:4561
      - 4562:4562
      - 4563:4563

  kibana:
    image: kibana:8.11.0
    container_name: mall-kibana
    hostname: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - elasticsearch.hosts=http://elasticsearch:9200
      - TZ=Asia/Shanghai
    networks:
      - mall-net
    ports:
      - 5601:5601
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  mongo:
    image: mongo:4
    container_name: mall-mongo
    hostname: mongo
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - /mydata/mongo/db:/data/db
    ports:
      - 27017:27017
    networks:
      - mall-net
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio
    container_name: mall-minio
    hostname: minio
    restart: always
    command: server /data --console-address ":9001"
    volumes:
      - /mydata/minio/data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - TZ=Asia/Shanghai
    networks:
      - mall-net
    # 容器内固定 9000（API）+ 9001（console），宿主机可改
    ports:
      - 9000:9000
      - 9001:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
