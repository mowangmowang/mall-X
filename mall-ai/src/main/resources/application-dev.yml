server:
  port: 8086

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 5 #连接池初始化大小
      min-idle: 10 #最小空闲连接数
      max-active: 20 #最大连接数

mybatis:
  mapper-locations:
    - classpath:mapper/*.xml
    - classpath*:com/**/mapper/*.xml

ai:
  client:
    api-key: ${AI_API_KEY:your-api-key-here}  # 请通过环境变量 AI_API_KEY 或 application-local.yml 配置
    base-url: https://api.deepseek.com/v1
    model: deepseek-v4-flash
    temperature: 0.7
    max-tokens: 1024

logging:
  level:
    root: info
    com.macro.mall: debug
