server:
  port: 8086

# Stage 6: 移除 MyBatis + Druid + DataSource 配置（改用 OpenFeign 调 mall-portal）
# spring:
#   datasource:
#     url: jdbc:mysql://...
#   druid: ...

# mybatis:
